name: Azure Static Web Apps CI/CD

# 這個檔案是「範本」。如果你透過 Azure Portal 的精靈建立 Static Web App
# 並連結這個 GitHub repo，Azure 會自動幫你產生一份幾乎一樣的檔案、
# 自動建立 AZURE_STATIC_WEB_APPS_API_TOKEN 這個 GitHub Secret，
# 到時候可以直接用 Azure 產生的版本覆蓋這份範本即可，不需要手動填 token。

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches:
      - main

jobs:
  build_and_deploy_job:
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.action != 'closed')
    runs-on: ubuntu-latest
    name: Build and Deploy Job
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
          lfs: false
      - name: Build And Deploy
        id: builddeploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: "upload"
          app_location: "/"        # 網站原始碼所在路徑（repo 根目錄）
          output_location: ""      # 純靜態 HTML，沒有建置步驟，留空即可
          skip_app_build: true

  close_pull_request_job:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    name: Close Pull Request Job
    steps:
      - name: Close Pull Request
        id: closepullrequest
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          action: "close"
